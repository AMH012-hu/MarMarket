<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alazhar City Delivery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --main-red: #e63946;
            --main-black: #1a1a1a;
            --light-grey: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            /* خلفية تعبر عن التوصيل والسرعة */
            background-color: #f0f0f0;
            background-image: linear-gradient(rgba(240, 240, 240, 0.9), rgba(240, 240, 240, 0.9)), 
                              url('https://github.com/AMH012-hu/MarMarket/blob/main/Gemini_Generated_Image_dnjw3kdnjw3kdnjw(1).png');
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- الهيدر المتجاوب --- */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--main-black); 
            color: white; 
            padding: 10px 4%; 
            border-bottom: 3px solid var(--main-red);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            padding: 2px;
            animation: floatLogo 2s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        header h2 {
            margin: 0;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .cart-toggle-btn { 
            background: var(--main-red); 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- شريط التصنيفات --- */
        .category-bar {
            display: flex;
            gap: 8px;
            padding: 12px 10px;
            background: #fff;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid #ddd;
        }
        .category-bar::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: #eee;
            padding: 6px 18px;
            border-radius: 15px;
            white-space: nowrap;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .cat-btn.active { background: var(--main-red); color: white; }

        /* --- شبكة المنتجات للموبايل --- */
        #mainGrid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            padding: 10px;
        }

        .card { 
            background: white; 
            padding: 10px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .card img { 
            width: 100%; 
            height: 90px; 
            object-fit: contain; 
            margin-bottom: 5px;
        }

        .card h4 { font-size: 0.8rem; margin: 5px 0; height: 2.5em; overflow: hidden; }
        .price { color: var(--main-red); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }

        .btn-add { 
            background: var(--main-black); 
            color: white; 
            border: none; 
            padding: 8px; 
            width: 100%;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* --- سلة المشتريات --- */
        #cartPanel { 
            position: fixed; 
            right: -100%; 
            top: 0; 
            width: 85%; 
            max-width: 320px;
            height: 100%; 
            background: #fff; 
            transition: 0.3s; 
            padding: 20px;
            z-index: 2000;
        }
        #cartPanel.active { right: 0; }
        .cart-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1500;
        }
        .cart-overlay.active { display: block; }

        input {
            width: 100%; padding: 12px; margin: 5px 0;
            border: 1px solid #ccc; border-radius: 8px; font-size: 16px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img <img src="https://amh012-hu.github.io/MarMarket/5958747406847380999(1).jpg" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/50?text=DELIVERY'">
        <h2>ALAZHAR <span style="color:var(--main-red);">CITY</span></h2>
    </div>
    <button class="cart-toggle-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i>
        <span id="cartBtnText">(0)</span>
    </button>
</header>

<div class="category-bar">
    <div class="cat-btn active" onclick="filterCat('all', this)">الكل</div>
    <div class="cat-btn" onclick="filterCat('snacks', this)">سناكس</div>
    <div class="cat-btn" onclick="filterCat('drinks', this)">مشروبات</div>
    <div class="cat-btn" onclick="filterCat('dairy', this)">ألبان</div>
</div>

<div id="mainGrid"></div>

<div class="cart-overlay" id="overlay" onclick="toggleCart()"></div>

<div id="cartPanel">
    <h3>سلة الطلبات</h3>
    <div id="cartItems"></div>
    <hr>
    <h4>الإجمالي: <span id="finalTotal">0</span> ج.م</h4>
    <input type="text" id="clientName" placeholder="الاسم">
    <input type="text" id="clientLocation" placeholder="العنوان بالتفصيل">
    <button onclick="processOrder()" style="width:100%; background:var(--main-red); color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; margin-top:10px;">
        إرسال الطلب (واتساب)
    </button>
</div>

<script>
const myNum = "201277423376";

const products = [
    { id: 1, name: 'شيبسي تايجر عائلي', price: 20, cat: 'snacks', img: 'https://m.media-amazon.com/images/I/41-qXlO-KFL._AC_.jpg' },
    { id: 2, name: 'بيبسي كانز 330 مل', price: 15, cat: 'drinks', img: 'https://m.media-amazon.com/images/I/51p4i7tE3rL._AC_SL1000_.jpg' },
    { id: 3, name: 'جبنة عبور لاند 250جم', price: 35, cat: 'dairy', img: 'https://m.media-amazon.com/images/I/61M3W2vE2GL._AC_SL1500_.jpg' },
    { id: 4, name: 'لبن جهينة 1 لتر', price: 45, cat: 'dairy', img: 'https://m.media-amazon.com/images/I/51r-FvG8G9L._AC_SL1000_.jpg' }
];

let cart = [];

function renderProducts(filter = 'all') {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = "";
    const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);
    filtered.forEach(p => {
        grid.innerHTML += `
            <div class="card">
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/100?text=No+Image'">
                <h4>${p.name}</h4>
                <div class="price">${p.price} ج.م</div>
                <button class="btn-add" onclick="addToCart(${p.id})">أضف للسلة</button>
            </div>
        `;
    });
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProducts(cat);
}

function addToCart(id) {
    cart.push(products.find(x => x.id === id));
    updateCart();
}

function updateCart() {
    document.getElementById('cartBtnText').innerText = `(${cart.length})`;
    let total = cart.reduce((s, i) => s + i.price, 0);
    document.getElementById('finalTotal').innerText = total;
    document.getElementById('cartItems').innerHTML = cart.map(i => `<p style="font-size:0.8rem;">${i.name} - ${i.price} ج.م</p>`).join('');
}

function toggleCart() {
    document.getElementById('cartPanel').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
}

function processOrder() {
    let name = document.getElementById('clientName').value;
    let loc = document.getElementById('clientLocation').value;
    if(!name || !loc || cart.length === 0) { alert("أكمل البيانات والطلبات"); return; }
    let msg = `*طلب جديد من Alazhar Delivery*%0A👤 الاسم: ${name}%0A📍 الموقع: ${loc}%0A🛒 الطلبات:%0A` + cart.map(i => `- ${i.name}`).join('%0A');
    window.open(`https://wa.me/${myNum}?text=${msg}`);
}

renderProducts();
</script>
</body>
</html>
