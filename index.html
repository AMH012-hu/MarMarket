<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alazhar City Delivery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --main-red: #e63946;
            --main-black: #1a1a1a;
            --light-grey: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: #f0f0f0; 
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            padding-bottom: env(safe-area-inset-bottom); /* لدعم هواتف آيفون الحديثة */
        }

        /* --- الهيدر المتجاوب --- */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--main-black); 
            color: white; 
            padding: 10px 4%; 
            border-bottom: 3px solid var(--main-red);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 45px;
            height: auto;
            animation: floatLogo 2s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        header h2 {
            margin: 0;
            font-size: 0.95rem; /* حجم خط مناسب للموبايل */
            white-space: nowrap;
        }

        .cart-toggle-btn { 
            background: var(--main-red); 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- شريط التصنيفات المرن --- */
        .category-bar {
            display: flex;
            justify-content: flex-start;
            gap: 8px;
            padding: 12px 10px;
            background: #fff;
            overflow-x: auto; /* يسمح بالسحب الأفقي على الموبايل */
            scrollbar-width: none; /* إخفاء الشريط في فايرفوكس */
            -webkit-overflow-scrolling: touch;
            border-bottom: 1px solid #ddd;
        }

        .category-bar::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: #eee;
            padding: 6px 18px;
            border-radius: 15px;
            white-space: nowrap;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .cat-btn.active {
            background: var(--main-red);
            color: white;
        }

        /* --- شبكة المنتجات (تلقائية التعديل) --- */
        #mainGrid { 
            display: grid; 
            /* عرض كارتين في الصف الواحد للموبايل */
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 12px;
        }

        /* للشاشات الأكبر قليلاً (مثل التابلت) */
        @media (min-width: 600px) {
            #mainGrid { grid-template-columns: repeat(3, 1fr); }
        }

        .card { 
            background: white; 
            padding: 10px; 
            border-radius: 10px; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card img { 
            width: 100%; 
            height: 100px; 
            object-fit: contain; 
            margin-bottom: 8px;
        }

        .card h4 {
            font-size: 0.85rem;
            margin: 5px 0;
            height: 2.4em; /* لتوحيد ارتفاع العناوين */
            overflow: hidden;
        }

        .price { 
            color: var(--main-red); 
            font-weight: bold; 
            font-size: 0.95rem; 
            margin-bottom: 8px;
        }

        .btn-add { 
            background: var(--main-black); 
            color: white; 
            border: none; 
            padding: 8px; 
            width: 100%;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* --- سلة المشتريات الجانبية --- */
        #cartPanel { 
            position: fixed; 
            right: -100%; /* تغطي كامل العرض عند الفتح في الموبايل */
            top: 0; 
            width: 85%; /* عرض السلة على الموبايل */
            max-width: 320px;
            height: 100%; 
            background: #fff; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            z-index: 2000;
        }

        #cartPanel.active { right: 0; }

        .cart-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
        }

        .cart-overlay.active { display: block; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem; /* يمنع الزوم التلقائي في آيفون */
        }
    </style>
</head>

<body>

<header>
    <div class="logo-container">
        <img src="https://amh012-hu.github.io/MarMarket/5958747406847380999(1).jpg" alt="Logo" class="logo">
        <h2>ALAZHAR <span style="color:var(--main-red);">CITY</span></h2>
    </div>
    <button class="cart-toggle-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i>
        <span id="cartBtnText">(0)</span>
    </button>
</header>

<div class="category-bar">
    <div class="cat-btn active" onclick="filterCat('all', this)">الكل</div>
    <div class="cat-btn" onclick="filterCat('snacks', this)">سناكس</div>
    <div class="cat-btn" onclick="filterCat('drinks', this)">مشروبات</div>
    <div class="cat-btn" onclick="filterCat('dairy', this)">ألبان</div>
</div>

<div id="mainGrid"></div>

<div class="cart-overlay" id="overlay" onclick="toggleCart()"></div>

<div id="cartPanel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>سلة الطلبات</h3>
        <i class="fas fa-times" onclick="toggleCart()" style="font-size:1.5rem;"></i>
    </div>
    <div id="cartItems" style="max-height: 50vh; overflow-y: auto;"></div>
    <hr>
    <h4>الإجمالي: <span id="finalTotal">0</span> ج.م</h4>
    <input type="text" id="clientName" placeholder="الاسم">
    <input type="text" id="clientLocation" placeholder="العنوان بالتفصيل">
    <button onclick="processOrder()" style="width:100%; background:var(--main-red); color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; font-size:1.1rem; margin-top:10px;">
        إرسال الطلب (واتساب)
    </button>
</div>

<script>
const myNum = "201277423376";

const products = [
    { id: 1, name: 'شيبسي تايجر عائلي', price: 20, cat: 'snacks', img: 'https://m.media-amazon.com/images/I/41-qXlO-KFL._AC_.jpg' },
    { id: 2, name: 'بيبسي كانز 330 مل', price: 15, cat: 'drinks', img: 'https://m.media-amazon.com/images/I/51p4i7tE3rL._AC_SL1000_.jpg' },
    { id: 3, name: 'جبنة عبور لاند 250جم', price: 35, cat: 'dairy', img: 'https://m.media-amazon.com/images/I/61M3W2vE2GL._AC_SL1500_.jpg' },
    { id: 4, name: 'لبن جهينة 1 لتر', price: 45, cat: 'dairy', img: 'https://m.media-amazon.com/images/I/51r-FvG8G9L._AC_SL1000_.jpg' }
];

let cart = [];

function renderProducts(filter = 'all') {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = "";
    const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);
    filtered.forEach(p => {
        grid.innerHTML += `
            <div class="card">
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/100?text=No+Image'">
                <h4>${p.name}</h4>
                <div class="price">${p.price} ج.م</div>
                <button class="btn-add" onclick="addToCart(${p.id})">أضف للسلة</button>
            </div>
        `;
    });
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProducts(cat);
}

function addToCart(id) {
    cart.push(products.find(x => x.id === id));
    updateCart();
}

function updateCart() {
    document.getElementById('cartBtnText').innerText = `(${cart.length})`;
    let total = cart.reduce((s, i) => s + i.price, 0);
    document.getElementById('finalTotal').innerText = total;
    document.getElementById('cartItems').innerHTML = cart.map((i, index) => 
        `<div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.9rem;">
            <span>${i.name}</span>
            <b>${i.price} ج.م</b>
        </div>`).join('');
}

function toggleCart() {
    document.getElementById('cartPanel').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
}

function processOrder() {
    let name = document.getElementById('clientName').value;
    let loc = document.getElementById('clientLocation').value;
    if(!name || !loc || cart.length === 0) { alert("يرجى إكمال البيانات واختيار منتجات"); return; }
    
    let itemsTxt = cart.map(i => `- ${i.name} (${i.price}ج.م)`).join('%0A');
    let total = document.getElementById('finalTotal').innerText;
    
    let msg = `*طلب جديد من Alazhar Delivery*%0A%0A👤 *الاسم:* ${name}%0A📍 *العنوان:* ${loc}%0A%0A🛒 *الطلبات:*%0A${itemsTxt}%0A%0A💰 *الإجمالي:* ${total} ج.م`;
    window.open(`https://wa.me/${myNum}?text=${msg}`);
}

renderProducts();
</script>

</body>
</html>
