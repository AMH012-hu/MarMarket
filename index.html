<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alazhar City Delivery</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --main-red: #e63946;
    --main-black: #1a1a1a;
    --bg: #f5f5f5;
}

body {
    margin: 0;
    font-family: 'Segoe UI';
    background: var(--bg);
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--main-black);
    color: white;
    padding: 10px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo {
    width: 40px;
    border-radius: 50%;
}

.cart-btn {
    background: var(--main-red);
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 20px;
}

/* CATEGORY */
.category-bar {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
    background: white;
}

.cat-btn {
    background: #eee;
    padding: 6px 15px;
    border-radius: 15px;
    cursor: pointer;
}

.cat-btn.active {
    background: var(--main-red);
    color: white;
}

/* PRODUCTS */
#mainGrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    height: 100px;
    object-fit: contain;
}

.price {
    color: var(--main-red);
    font-weight: bold;
}

.btn-add {
    background: var(--main-black);
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

/* CART */
#cartPanel {
    position: fixed;
    right: -100%;
    top: 0;
    width: 80%;
    height: 100%;
    background: white;
    transition: 0.3s;
    padding: 15px;
    z-index: 2000;
}

#cartPanel.active {
    right: 0;
}

.overlay {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
}

.overlay.active {
    display: block;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

/* FLOAT BUTTON */
.cart-floating {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: var(--main-red);
    color: white;
    border-radius: 50%;
    padding: 15px;
    font-size: 18px;
}
</style>
</head>

<body>

<header>
    <div>
        <img src="https://amh012-hu.github.io/MarMarket/5958747406847380999(1).jpg" class="logo">
        ALAZHAR CITY
    </div>
    <button class="cart-btn" onclick="toggleCart()">
        🛒 <span id="cartCount">0</span>
    </button>
</header>

<div class="category-bar">
    <div class="cat-btn active" onclick="filterCat('all',this)">الكل</div>
    <div class="cat-btn" onclick="filterCat('snacks',this)">سناكس</div>
    <div class="cat-btn" onclick="filterCat('drinks',this)">مشروبات</div>
    <div class="cat-btn" onclick="filterCat('dairy',this)">ألبان</div>
</div>

<div id="mainGrid"></div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div id="cartPanel">
    <h3>السلة</h3>
    <div id="cartItems"></div>
    <h4>الإجمالي: <span id="total">0</span> ج.م</h4>

    <input id="name" placeholder="الاسم">
    <input id="address" placeholder="العنوان">

    <button onclick="sendOrder()" style="background:red;color:white;padding:10px;width:100%">
        إرسال واتساب
    </button>
</div>

<script>
const phone = "201277423376";

const products = [
{ id:1,name:"شيبسي",price:20,cat:"snacks",img:"https://via.placeholder.com/100"},
{ id:2,name:"بيبسي",price:15,cat:"drinks",img:"https://via.placeholder.com/100"},
{ id:3,name:"جبنة",price:35,cat:"dairy",img:"https://via.placeholder.com/100"},
{ id:4,name:"لبن",price:45,cat:"dairy",img:"https://via.placeholder.com/100"},
];

let cart=[];

/* RENDER */
function render(cat="all"){
let grid=document.getElementById("mainGrid");
grid.innerHTML="";

let list = cat=="all"?products:products.filter(p=>p.cat==cat);

list.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">${p.price} ج.م</div>
<button class="btn-add" onclick="add(${p.id},this)">أضف</button>
</div>`;
});
}

/* FILTER */
function filterCat(cat,btn){
document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render(cat);
}

/* ADD */
function add(id,btn){
let item=cart.find(x=>x.id==id);

if(item){
item.qty++;
}else{
let p=products.find(x=>x.id==id);
cart.push({...p,qty:1});
}

btn.innerText="✔";
setTimeout(()=>btn.innerText="أضف",1000);

updateCart();
}

/* UPDATE CART */
function updateCart(){
document.getElementById("cartCount").innerText=cart.length;

let html="";
let total=0;

if(cart.length==0){
html="<p>السلة فارغة</p>";
}

cart.forEach(i=>{
total+=i.price*i.qty;
html+=`
<div style="display:flex;justify-content:space-between">
${i.name} × ${i.qty}
<span>${i.price*i.qty}</span>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* TOGGLE */
function toggleCart(){
document.getElementById("cartPanel").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

/* SEND */
function sendOrder(){
let name=document.getElementById("name").value;
let address=document.getElementById("address").value;

if(!name||!address||cart.length==0){
alert("اكمل البيانات");
return;
}

let items=cart.map(i=>`${i.name} x${i.qty}`).join("%0A");
let total=document.getElementById("total").innerText;

let msg=`طلب جديد%0A${name}%0A${address}%0A${items}%0Aالإجمالي: ${total}`;

window.open(`https://wa.me/${phone}?text=${msg}`);
}

render();
</script>

</body>
