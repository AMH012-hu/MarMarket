<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alazhar City Delivery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --main-red: #e63946;
            --main-black: #1a1a1a;
            --light-grey: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: #f0f0f0; 
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            padding-bottom: 50px;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--main-black); 
            color: white; 
            padding: 15px 5%; 
            border-bottom: 4px solid var(--main-red);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .cart-toggle-btn { 
            background: var(--main-red); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 30px; 
        }

        .category-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #fff;
            overflow-x: auto;
            border-bottom: 1px solid #ddd;
        }

        .cat-btn {
            background: #eee;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .cat-btn.active {
            background: var(--main-red);
            color: white;
        }

        #mainGrid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            padding: 20px 5%;
        }

        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            border-bottom: 5px solid var(--main-black);
        }

        .card img { max-width: 100%; height: 140px; object-fit: contain; }

        .price { color: var(--main-red); font-weight: bold; }

        .btn-add { 
            background: var(--main-black); 
            color: white; 
            border: none; 
            padding: 10px; 
            width: 100%;
            cursor: pointer;
        }

        #cartPanel { 
            position: fixed; 
            right: -350px; 
            top: 0; 
            width: 320px; 
            height: 100%; 
            background: #fff; 
            transition: 0.3s; 
            padding: 20px;
        }

        #cartPanel.active { right: 0; }

        .btn-checkout { 
            background: var(--main-red); 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%;
        }

        #receiptOverlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            justify-content: center; 
            align-items: center;
        }

        .receipt-box { 
            background: white; 
            padding: 20px; 
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h2>ALAZHAR <span style="color:#e63946;">CITY DELIVERY</span></h2>
    <button class="cart-toggle-btn" onclick="toggleCart()">
        🛒 <span id="cartBtnText">السلة (0)</span>
    </button>
</header>

<div class="category-bar">
    <div class="cat-btn active" onclick="filterCat('all', this)">الكل</div>
    <div class="cat-btn" onclick="filterCat('snacks', this)">سناكس</div>
    <div class="cat-btn" onclick="filterCat('drinks', this)">مشروبات</div>
    <div class="cat-btn" onclick="filterCat('dairy', this)">ألبان</div>
</div>

<div id="mainGrid"></div>

<div id="cartPanel">
    <h3>سلة التسوق</h3>
    <div id="cartItems"></div>
    <h4>الإجمالي: <span id="finalTotal">0</span> ج.م</h4>
    <input type="text" id="clientName" placeholder="الاسم">
    <input type="text" id="clientLocation" placeholder="العنوان">
    <button class="btn-checkout" onclick="processOrder()">تأكيد الطلب</button>
</div>

<div id="receiptOverlay">
    <div class="receipt-box">
        <h2>طلب جديد</h2>
        <div id="rItems"></div>
        <h3 id="rTotal"></h3>
    </div>
</div>

<script>
const myNum = "201277423376";

const products = [
    { id: 1, name: 'شيبسي', price: 20, cat: 'snacks', img: 'https://via.placeholder.com/150' },
    { id: 2, name: 'بيبسي', price: 15, cat: 'drinks', img: 'https://via.placeholder.com/150' },
    { id: 3, name: 'جبنة', price: 35, cat: 'dairy', img: 'https://via.placeholder.com/150' }
];

let cart = [];

function renderProducts(filter = 'all') {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = "";

    const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);

    filtered.forEach(p => {
        grid.innerHTML += `
            <div class="card">
                <img src="${p.img}">
                <h4>${p.name}</h4>
                <div class="price">${p.price} ج.م</div>
                <button class="btn-add" onclick="addToCart(${p.id})">أضف</button>
            </div>
        `;
    });
}

function addToCart(id) {
    cart.push(products.find(x => x.id === id));
    updateCart();
}

function updateCart() {
    document.getElementById('cartBtnText').innerText = `السلة (${cart.length})`;
    let total = cart.reduce((s, i) => s + i.price, 0);
    document.getElementById('finalTotal').innerText = total;
}

function toggleCart() {
    document.getElementById('cartPanel').classList.toggle('active');
}

function processOrder() {
    let name = document.getElementById('clientName').value;
    let loc = document.getElementById('clientLocation').value;

    let msg = `طلب من Alazhar City Delivery\nالاسم: ${name}\nالعنوان: ${loc}`;
    window.open(`https://wa.me/${myNum}?text=${encodeURIComponent(msg)}`);
}

renderProducts();
</script>

</body>
</html>
